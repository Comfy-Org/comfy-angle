name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      electron_version:
        description: "Electron version to extract ANGLE libs from"
        required: true
        default: "41.0.3"

permissions:
  contents: read
  id-token: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install JS dependencies
        working-directory: scripts
        run: npm ci

      - name: Download ANGLE libraries
        run: node scripts/download.js ${{ inputs.electron_version }}

      - uses: actions/upload-artifact@v5
        with:
          name: platform-libs
          path: platform_libs/

  build:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v5
        with:
          name: platform-libs
          path: platform_libs/

      - name: Install build tools
        run: pip install build

      - name: Build wheels
        run: python scripts/build.py

      - name: Verify manylinux compliance
        run: |
          pip install auditwheel
          for whl in dist/*manylinux*.whl; do
            echo "=== Checking $whl ==="
            auditwheel show "$whl"
          done

      - uses: actions/upload-artifact@v5
        with:
          name: wheels
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: wheels
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
